[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    # v4-periphery + its v4-core dep are used by the AddV4Liquidity helper
    # script (Actions / LiquidityAmounts / TickMath). Pin remappings here so
    # imports compile without touching the existing src/ inline V4 interfaces
    # in GCCCCAToV4Seeder.
    "v4-periphery/=lib/v4-periphery/",
    "v4-core/=lib/v4-periphery/lib/v4-core/",
    "@uniswap/v4-core/=lib/v4-periphery/lib/v4-core/",
    "permit2/=lib/v4-periphery/lib/permit2/",
    "solmate/=lib/v4-periphery/lib/v4-core/lib/solmate/",
]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
quote_style = "double"
number_underscore = "thousands"
